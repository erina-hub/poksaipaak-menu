<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการผลไม้พร้อมส่งวันนี้</title>
    <style>
        :root {
            --bg-cream: #FCF9F2; --text-dark: #333333;
            --apple-red: #D34C48; --apple-red-light: #FDECEA;
            --green-stock: #52894E; --gray-out: #A0A0A0;
            --border-color: #EAE3D5; --line-green: #00B900; --fb-blue: #0084FF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--bg-cream); color: var(--text-dark); line-height: 1.6; padding-bottom: 120px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; background-color: #FFFFFF; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.03); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--apple-red); font-size: 26px; margin-bottom: 5px; }
        .contact-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .contact-buttons a { text-decoration: none; color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 15px; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .contact-buttons a:hover { transform: translateY(-2px); }
        .btn-line { background-color: var(--line-green); }
        .btn-fb { background-color: var(--fb-blue); }
        .note-box { background-color: var(--apple-red-light); border: 2px dashed var(--apple-red); padding: 15px; border-radius: 8px; margin: 20px 0; text-align: center; color: var(--apple-red); font-weight: bold; }
        
        .category-title { background-color: var(--apple-red); color: white; padding: 8px 20px; border-radius: 25px; display: inline-block; margin: 25px 0 15px 0; font-size: 18px; }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .product-info { flex: 1; padding-right: 15px; word-break: keep-all; }
        .product-name { font-size: 16px; font-weight: 500; }
        .product-status { font-size: 13px; margin-top: 3px; }
        .status-in { color: var(--green-stock); }
        .status-out { color: var(--apple-red); font-weight: bold; }
